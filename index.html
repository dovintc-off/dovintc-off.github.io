<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dovintc Off | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05) rotate(5deg);
            border-color: #00d2ff;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .bio {
            font-size: 15px;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d2ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2);
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://raw.githubusercontent.com/dovintc-off/dovintc-off.github.io/main/profile.png" alt="Avatar" class="avatar">
        
        <h1 id="name">Dovintc-off</h1>
        <p class="subtitle">Web Developer & Enthusiast</p>
        
        <p class="bio">
            Hi, I'm a passionate developer creating a custom 3D game engine from scratch. Also exploring Full-Stack development.
        </p>

        <div class="links">
            <a href="https://github.com/dovintc-off" target="_blank" class="btn">
                <span>GitHub Profile</span>
            </a>
            <a href="https://discord.gg/P7nzsdgZ7F" class="btn">
                <span>My Discord</span>
            </a>
        </div>
    </div>

    <script>
        const nameElement = document.getElementById('name');
        const originalText = nameElement.innerText;
        nameElement.innerText = '';
        
        let i = 0;
        function typeWriter() {
            if (i < originalText.length) {
                nameElement.innerHTML += originalText.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }
        
        setTimeout(typeWriter, 500);
    </script>

</body>
</html>
